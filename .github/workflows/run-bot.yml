name: Run Telegram Link Bypasser Bot

on:
  push:
    branches:
      - main
  workflow_dispatch: # Isse aap GitHub par manually button daba kar bhi bot start kar sakte hain

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Python 3.10 standard aur stable hai is bot ke liye
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Purani conflict paida karne wali urllib3 aur requests ko clean kar rahe hain
        pip uninstall -y urllib3 requests
        
        # Fresh aur compatible versions install kar rahe hain
        pip install requests==2.31.0 urllib3==1.26.18
        
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Baki bache essentials ko install karne ke liye
        pip install pyrogram tgcrypto urlextract

    - name: Run Bot
      env:
        # Aapke Variables tab se credentials load karne ke liye vars. use kiya hai
        TOKEN: ${{ vars.TOKEN }}
        HASH: ${{ vars.HASH }}
        ID: ${{ vars.ID }}
        # Agar aap baad me database connect karein toh unhe Secrets me daal sakte hain
        DB_API: ${{ secrets.DB_API }}
        DB_OWNER: ${{ secrets.DB_OWNER }}
        DB_NAME: ${{ secrets.DB_NAME }}
      run: |
        # Agar config.json required hai aur env se data fallback ho raha hai,
        # toh error avoid karne ke liye ek khali config.json create kar rahe hain
        if [ ! -f config.json ]; then echo "{}" > config.json; fi
        python app.py
