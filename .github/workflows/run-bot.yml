name: Run Telegram Link Bypasser Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip uninstall -y urllib3 requests
        pip install requests==2.31.0 urllib3==1.26.18
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyrogram tgcrypto urlextract flask

    - name: Run Bot and Web Server
      env:
        TOKEN: ${{ secrets.TOKEN }}
        HASH: ${{ secrets.HASH }}
        ID: ${{ secrets.ID }}
        DB_API: ${{ secrets.DB_API }}
        DB_OWNER: ${{ secrets.DB_OWNER }}
        DB_NAME: ${{ secrets.DB_NAME }}
      run: |
        if [ ! -f config.json ]; then echo "{}" > config.json; fi
        python app.py
